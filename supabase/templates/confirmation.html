<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #ffffff; padding: 40px 20px; margin: 0;">
  <div style="max-width: 560px; margin: 0 auto;">
    <div style="margin-bottom: 32px;">
      <span style="font-size: 20px; font-weight: 700; color: #FA4500; letter-spacing: 0.08em;">ARGUS</span>
    </div>
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 32px;">
      <h1 style="font-size: 24px; font-weight: 700; margin: 0 0 16px; color: #ffffff;">Confirm your email</h1>
      <p style="color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 24px; font-size: 15px;">
        Click the button below to confirm your email address and activate your Argus account.
      </p>
      <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
         style="display: inline-block; background: #FA4500; color: white; padding: 14px 28px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 15px;">
        Confirm my email &rarr;
      </a>
      <p style="color: rgba(255,255,255,0.3); font-size: 13px; margin-top: 32px; line-height: 1.5;">
        If you didn't create an Argus account, you can safely ignore this email.
      </p>
    </div>
    <p style="text-align: center; margin-top: 24px; font-size: 13px; color: rgba(255,255,255,0.25);">
      Argus &middot; Clone any website with AI
    </p>
  </div>
</body>
</html>
