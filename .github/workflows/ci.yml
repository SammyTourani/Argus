name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Type-check & unit tests
    runs-on: ubuntu-latest

    # No secrets are used: type-checking and Vitest unit tests run entirely
    # offline. Playwright e2e (tests/e2e/*.spec.ts) needs a browser and live
    # services, so it is intentionally NOT run here.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npx vitest run
